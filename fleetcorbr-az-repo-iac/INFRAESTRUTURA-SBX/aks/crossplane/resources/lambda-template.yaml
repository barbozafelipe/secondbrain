apiVersion: aws.semparar.io/v1alpha1
kind: XLambda
metadata:
  name: crossplane-lambda-test
  namespace: crossplane-system
spec:
  providerConfigName: aws-infra-provider-config
  resourceConfig:
    description: "Lambda criado via composition"
    handler: index.handler
    memorySize: 256
    region: sa-east-1
    runtime: "nodejs20.x"
    s3Bucket: flt-terraform-cloud
