    vpcConfig:
      securityGroupIds:
        - sg-089c4846390b31a33
      subnetIds:
        - subnet-02e13e6cae291fbb3 
        - subnet-086074f7b9d4da562
    variables:
      KEY01: Value01
      KEY02: Value02
    tags:
      Managed-by: Crossplane