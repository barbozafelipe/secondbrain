apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: composition-lambda-default
spec:
  compositeTypeRef:
    apiVersion: aws.semparar.io/v1alpha1
    kind: XLambdaFunction
  mode: Pipeline
  pipeline:
  - step: patch-and-transform
    functionRef:
      name: function-patch-and-transform
    input:
      apiVersion: pt.fn.crossplane.io/v1beta1
      kind: Resources
      patchSets:
      - name: common-fields
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.providerConfigName"
          toFieldPath: "spec.providerConfigRef.name"
      resources:
      - name: function
        base:
          apiVersion: lambda.aws.upbound.io/v1beta1
          kind: Function
          spec:
            managementPolicies: ["Observe", "Create", "Update", "Delete"]
        patches:
        - type: PatchSet
          patchSetName: common-fields
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.claimRef.name"
          toFieldPath:  "metadata.name"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.resourceConfig.description"
          toFieldPath: "spec.forProvider.description"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.resourceConfig.handler"
          toFieldPath: "spec.forProvider.handler"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.resourceConfig.memorySize"
          toFieldPath: "spec.forProvider.memorySize"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.resourceConfig.region"
          toFieldPath: "spec.forProvider.region"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.resourceConfig.role"
          toFieldPath: "spec.forProvider.role"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.resourceConfig.runtime"
          toFieldPath: "spec.forProvider.runtime"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.resourceConfig.s3Bucket"
          toFieldPath: "spec.forProvider.s3Bucket"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.resourceConfig.s3Key"
          toFieldPath: "spec.forProvider.s3Key"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.resourceConfig.timeout"
          toFieldPath: "spec.forProvider.timeout"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.resourceConfig.variables"
          toFieldPath: "spec.initProvider.environment[0].variables"
          policy:
            mergeOptions:
              keepMapValues: true
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.resourceConfig.vpcConfig.securityGroupIds"
          toFieldPath: "spec.forProvider.vpcConfig[0].securityGroupIds"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.resourceConfig.vpcConfig.subnetIds"
          toFieldPath: "spec.forProvider.vpcConfig[0].subnetIds"              
        - type: FromCompositeFieldPath
          fromFieldPath: spec.resourceConfig.tags
          toFieldPath: spec.initProvider.tags
          policy:
            mergeOptions:
              keepMapValues: true

